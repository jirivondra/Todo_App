version: '3'

tasks:
  # --- API ---
  be-up:
    desc: Start the FastAPI backend
    cmd: uvicorn api.main:app --reload --host 0.0.0.0 --port 8000

  # --- Tests ---
  run-test:
    desc: Run all tests
    cmd: npm run test

  test-watch:
    desc: Run tests in watch mode
    cmd: npm run test-watch

  test-result:
    desc: Run tests with verbose output
    cmd: npm run test-verbose

  # --- Frontend ---
  fe-up:
    desc: Serve the frontend on http://localhost:3000
    cmd: python3 -m http.server 3000 --directory frontend

  fe-down:
    desc: Stop the frontend server
    cmd: pkill -f "http.server 3000" || true

  # --- Utilities ---
  clean:
    desc: Remove Python cache files
    cmd: find . -type d -name __pycache__ -exec rm -rf {} +

  be-down:
    desc: Stop the running API
    cmd: pkill -f "uvicorn api.main:app" || true

  restart:
    desc: Clean cache and restart the API
    cmds:
      - task: clean
      - task: be-up

  # --- Code quality ---
  lint:
    desc: Check code with ESLint
    cmd: npm run lint

  lint-fix:
    desc: Auto-fix lint issues with ESLint
    cmd: npm run lint-fix

  format-check:
    desc: Check code formatting with Prettier
    cmd: npm run format-check

  check:
    desc: Run all code quality checks (ESLint + Prettier)
    cmds:
      - task: lint
      - task: format-check

  fix:
    desc: Auto-fix formatting and lint issues (Prettier + ESLint)
    cmds:
      - npm run format
      - npm run lint-fix
